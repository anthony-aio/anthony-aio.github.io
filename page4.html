<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream:#fdf6ee; --blush:#e8b4a0; --deep:#2c1a12; --mid:#7a4f3a; --accent:#c97d5e; }

    body {
      background-color: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      bottom: -200px; left: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,180,160,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease both;
    }

    .sub {
      font-size: 0.9rem;
      color: var(--mid);
      margin-bottom: 2.5rem;
    }

    /*
      The roam zone holds BOTH buttons side by side.
      It's tall enough that No can jump up/down without clipping,
      and wide enough that they start centered.
      Yes is absolutely positioned too so it never moves in the layout
      but also never gets displaced — it just scales in place.
    */
    .roam-zone {
      position: relative;
      width: 100%;
      height: 160px;
      margin-bottom: 1rem;
    }

    /* Shared pill style */
    .btn-yes,
    .btn-no {
      position: absolute;
      padding: 0.9rem 2.8rem;
      border-radius: 100px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid;
    }

    .btn-yes {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform-origin: center;
      transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), background 0.3s;
    }
    .btn-yes:hover { background: #b5694a; }

    .btn-no {
      background: transparent;
      border-color: var(--blush);
      color: var(--mid);
      transition: left 0.2s cubic-bezier(.25,.46,.45,.94),
                  top  0.2s cubic-bezier(.25,.46,.45,.94),
                  font-size 0.3s ease,
                  padding   0.3s ease,
                  opacity   0.3s ease;
    }
    .btn-no:hover { background: #f5e4da; }

    .back-row { margin-top: 0.25rem; }
    .btn-back {
      background: transparent;
      border: 1px solid transparent;
      color: var(--mid);
      font-size: 0.75rem;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 100px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back:hover { border-color: var(--blush); color: var(--deep); }

    .response {
      display: none;
      animation: fadeUp 0.8s ease both;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .response.visible { display: block; }

    .response-gif {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      margin: 0 auto 1.5rem;
      display: block;
    }

    .response-yes p, .response-no p {
      font-size: 0.95rem;
      color: var(--mid);
      line-height: 1.8;
      max-width: 380px;
      margin: 0 auto;
    }

    #confetti-canvas {
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      pointer-events: none;
      z-index: 999;
    }

    .petal {
      position: fixed;
      border-radius: 50%;
      background: var(--blush);
      opacity: 0;
      animation: float linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%   { transform: translateY(100vh); opacity: 0; }
      8%   { opacity: 0.45; }
      92%  { opacity: 0.45; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="petal" style="left:8%;  width:5px; height:5px; animation-duration:7s; animation-delay:0s;"></div>
  <div class="petal" style="left:22%; width:8px; height:8px; animation-duration:9s; animation-delay:0s;"></div>
  <div class="petal" style="left:38%; width:4px; height:4px; animation-duration:6s; animation-delay:0s;"></div>
  <div class="petal" style="left:55%; width:7px; height:7px; animation-duration:8s; animation-delay:0s;"></div>
  <div class="petal" style="left:70%; width:5px; height:5px; animation-duration:7s; animation-delay:0s;"></div>
  <div class="petal" style="left:85%; width:6px; height:6px; animation-duration:6s; animation-delay:0s;"></div>
  <div class="petal" style="left:15%; width:4px; height:4px; animation-duration:8s; animation-delay:2s;"></div>
  <div class="petal" style="left:48%; width:6px; height:6px; animation-duration:7s; animation-delay:3s;"></div>
  <div class="petal" style="left:92%; width:5px; height:5px; animation-duration:9s; animation-delay:1s;"></div>

  <div class="card" id="question-section">
    <!-- ✏️ EDIT: Text above the buttons -->
    <p class="sub">no pressure :)</p>

    <!-- Both buttons live inside the roam zone, positioned by JS -->
    <div class="roam-zone" id="roam-zone">
      <button class="btn-yes" id="btn-yes" onclick="chooseYes()">Yes</button>
      <button class="btn-no"  id="btn-no"  onclick="handleNo()">No</button>
    </div>

    <div class="back-row">
      <a href="page3.html" class="btn-back">&larr; Back</a>
    </div>
  </div>

  <div class="response response-yes" id="response-yes">
    <img src="yes.gif" alt="" class="response-gif" />
    <!-- ✏️ EDIT: Message after yes -->
    <p>let me know when you're free :)</p>
  </div>

  <div class="response response-no" id="response-no">
    <img src="no.gif" alt="" class="response-gif" />
    <!-- ✏️ EDIT: Message after no -->
    <p>that's okay too :)</p>
  </div>

  <script>
    // ✏️ YOUR EMAILJS KEYS
    const EMAILJS_PUBLIC_KEY  = "KgMT78Tq_FKDnPc22";
    const EMAILJS_SERVICE_ID  = "service_r4o1p14";
    const EMAILJS_TEMPLATE_ID = "template_g1yx5t8";

    emailjs.init(EMAILJS_PUBLIC_KEY);

    let noPresses = 0;
    // Random threshold between 3 and 7 — different every time the page loads
    const MAX_NO  = Math.floor(Math.random() * 5) + 3;

    const yesBtn  = document.getElementById("btn-yes");
    const noBtn   = document.getElementById("btn-no");
    const roamBox = document.getElementById("roam-zone");

    // Gap between the two buttons when side by side
    const BTN_GAP = 16;

    // Place both buttons centered & side-by-side horizontally,
    // vertically centered in the roam zone.
    function initButtons() {
      const zoneW = roamBox.offsetWidth;
      const zoneH = roamBox.offsetHeight;

      const yesW = yesBtn.offsetWidth  || 110;
      const yesH = yesBtn.offsetHeight || 44;
      const noW  = noBtn.offsetWidth   || 90;
      const noH  = noBtn.offsetHeight  || 44;

      const totalW = yesW + BTN_GAP + noW;
      const startX = (zoneW - totalW) / 2;
      const midY   = (zoneH - Math.max(yesH, noH)) / 2;

      // Yes on the left
      yesBtn.style.left = startX + "px";
      yesBtn.style.top  = midY + "px";

      // No immediately to the right of Yes
      noBtn.style.left = (startX + yesW + BTN_GAP) + "px";
      noBtn.style.top  = midY + "px";

      // Save Yes anchor so it never moves
      yesBtn._anchorLeft = startX;
      yesBtn._anchorTop  = midY;
    }

    window.addEventListener("load", initButtons);

    function handleNo() {
      noPresses++;

      if (noPresses >= MAX_NO) {
        finishChoice("no");
        return;
      }

      // Only grow Yes and shrink No for the first 3 clicks — after that just keep jumping
      if (noPresses <= 3) {
        const yesScale = 1 + noPresses * 0.22;
        yesBtn.style.transform = `scale(${yesScale})`;

        const noScale   = Math.max(0.62, 1 - noPresses * 0.15);
        const noOpacity = Math.max(0.42, 1 - noPresses * 0.2);
        noBtn.style.fontSize = (0.85 * noScale) + "rem";
        noBtn.style.padding  = `${0.9 * noScale}rem ${2.8 * noScale}rem`;
        noBtn.style.opacity  = noOpacity;
      }

      // Jump No to a random spot in the roam zone, never overlapping Yes area
      requestAnimationFrame(() => {
        const zoneW = roamBox.offsetWidth;
        const zoneH = roamBox.offsetHeight;
        const noW   = noBtn.offsetWidth  || 80;
        const noH   = noBtn.offsetHeight || 38;
        const pad   = 8;

        // Yes occupies roughly left half — keep No to the right of center
        // so it never lands on top of Yes
        const yesRight = (yesBtn._anchorLeft || 0) + (yesBtn.offsetWidth || 110) + BTN_GAP;

        const minX = Math.max(pad, yesRight - 20); // slight overlap allowed but not full cover
        const maxX = zoneW - noW - pad;
        const minY = pad;
        const maxY = zoneH - noH - pad;

        let x, y, tries = 0;
        const curX = parseFloat(noBtn.style.left) || 0;
        const curY = parseFloat(noBtn.style.top)  || 0;

        do {
          x = minX + Math.random() * Math.max(0, maxX - minX);
          y = minY + Math.random() * Math.max(0, maxY - minY);
          tries++;
        } while (
          tries < 25 &&
          Math.abs(x - curX) < zoneW * 0.2 &&
          Math.abs(y - curY) < zoneH * 0.2
        );

        noBtn.style.left = x + "px";
        noBtn.style.top  = y + "px";
      });
    }

    function chooseYes() {
      finishChoice("yes");
    }

    function finishChoice(answer) {
      document.getElementById("question-section").style.display = "none";
      if (answer === "yes") {
        document.getElementById("response-yes").classList.add("visible");
        launchConfetti();
      } else {
        document.getElementById("response-no").classList.add("visible");
      }
      sendNotification(answer);
    }

    function sendNotification(answer) {
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        answer:   answer === "yes" ? "YES 🌷" : "No (after 3 tries)",
        time:     new Date().toLocaleString(),
        no_count: noPresses
      }).catch(err => console.warn("EmailJS error:", err));
    }

    function launchConfetti() {
      const canvas = document.getElementById("confetti-canvas");
      const ctx    = canvas.getContext("2d");
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const colors  = ["#e8b4a0","#c97d5e","#f5cfc3","#fdf6ee","#b5694a","#d4a090"];
      const pieces  = Array.from({length: 130}, () => ({
        x:     Math.random() * canvas.width,
        y:     Math.random() * -canvas.height,
        w:     Math.random() * 8 + 4,
        h:     Math.random() * 4 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot:   Math.random() * 360,
        speed: Math.random() * 3 + 1.5,
        drift: Math.random() * 2 - 1,
        spin:  Math.random() * 4 - 2
      }));
      let frame;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
          p.y += p.speed; p.x += p.drift; p.rot += p.spin;
        });
        if (pieces.some(p => p.y < canvas.height + 20)) {
          frame = requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
      setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); }, 5000);
    }
  </script>

</body>
</html>
