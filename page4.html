<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Question</title>

<style>
:root {
  --accent:#c97d5e;
  --blush:#e8b4a0;
  --mid:#7a4f3a;
}

/* Layout */
body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:sans-serif;
}

/* Row holding both buttons */
.button-row {
  display:flex;
  gap:16px;
  justify-content:center;
  align-items:center;
}

/* Shared button sizing (THIS makes them identical) */
.btn-yes,
.btn-no {
  width:140px;
  height:50px;
  border-radius:100px;
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
}

/* YES */
.btn-yes {
  background:var(--accent);
  color:white;
  border:none;
}

/* NO container (same size as YES so it's symmetrical) */
.roam-zone {
  position:relative;
  width:140px;
  height:50px;
}

/* NO button */
.btn-no {
  position:absolute;
  left:0;
  top:0;
  background:transparent;
  border:1px solid var(--blush);
  color:var(--mid);
}
</style>
</head>

<body>

<div class="button-row">
  <button class="btn-yes" id="btn-yes" onclick="chooseYes()">Yes</button>

  <div class="roam-zone" id="roam-zone">
    <button class="btn-no" id="btn-no" onclick="handleNo()">No</button>
  </div>
</div>

<script>
let noPresses = 0;

const noBtn = document.getElementById("btn-no");
const yesBtn = document.getElementById("btn-yes");
const roamBox = document.getElementById("roam-zone");

/* Start perfectly aligned */
function centerNoBtn() {
  noBtn.style.left = "0px";
  noBtn.style.top = "0px";
}

window.onload = centerNoBtn;

function handleNo() {
  noPresses++;

  /* grow yes */
  yesBtn.style.transform = `scale(${1 + noPresses * 0.2})`;

  /* move no randomly */
  const zoneW = roamBox.offsetWidth;
  const zoneH = roamBox.offsetHeight;

  const maxX = zoneW - noBtn.offsetWidth;
  const maxY = zoneH - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function chooseYes() {
  alert("YES selected");
}
</script>

</body>
</html>
