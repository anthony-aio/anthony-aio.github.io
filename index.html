<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hi</title>
  <!-- ✏️ EDIT: Change the title above to whatever you want in the browser tab -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf6ee;
      --blush: #e8b4a0;
      --deep: #2c1a12;
      --mid: #7a4f3a;
      --accent: #c97d5e;
    }

    body {
      background-color: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Soft background circles for depth */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,180,160,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      top: -150px; right: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -100px; left: -100px;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      animation: fadeUp 1.2s ease both;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      animation: fadeUp 1.2s ease 0.1s both;
    }

    /* ✏️ EDIT: This is the big heading on the first page */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 1.05;
      color: var(--deep);
      margin-bottom: 1.5rem;
      animation: fadeUp 1.2s ease 0.2s both;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    /* ✏️ EDIT: This is the subtitle paragraph on the first page */
    .subtitle {
      font-size: 1rem;
      color: var(--mid);
      line-height: 1.8;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      animation: fadeUp 1.2s ease 0.35s both;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.8rem;
      border: 1px solid var(--blush);
      color: var(--deep);
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 100px;
      background: transparent;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      animation: fadeUp 1.2s ease 0.5s both;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Floating petal decorations */
    .petal {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blush);
      opacity: 0.4;
      animation: float linear infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Floating dots -->
  <div class="petal" style="left:10%;animation-duration:12s;animation-delay:0s;width:5px;height:5px;"></div>
  <div class="petal" style="left:25%;animation-duration:15s;animation-delay:3s;width:8px;height:8px;"></div>
  <div class="petal" style="left:60%;animation-duration:11s;animation-delay:1s;width:4px;height:4px;"></div>
  <div class="petal" style="left:80%;animation-duration:14s;animation-delay:5s;width:6px;height:6px;"></div>
  <div class="petal" style="left:45%;animation-duration:13s;animation-delay:7s;width:5px;height:5px;"></div>

  <div class="container">

    <!-- ✏️ EDIT: The small text above the heading -->
    <p class="eyebrow">It's been awhile</p>

    <!-- ✏️ EDIT: The big heading — keep the <em> tags around the italic word -->
    <h1>Hi,<br><em>wendy</em></h1>

    <!-- ✏️ EDIT: The paragraph below the heading -->
    <p class="subtitle">
      I think it's time we addressed something..
    </p>

    <!-- ✏️ EDIT: Change the button text here if you want -->
    <a href="page2.html" class="btn">Next &rarr;</a>

  </div>
</body>
</html>
